<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOS - 更轻松的创建软件原型</title>
    <style>
        /* 全局重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f5f5f5;
            color: #222;
            font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #fff;
            padding: 30px 24px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            text-align: center;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 8px;
        }

        p {
            font-size: 16px;
            color: #555;
            margin-bottom: 16px;
        }

        img {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 12px auto;
        }

        a {
            display: inline-block;
            color: #0366d6;
            text-decoration: none;
            padding: 8px 0;
            word-break: break-all;
        }

        a:hover {
            text-decoration: underline;
        }

        /* 手机适配 */
        @media (max-width: 480px) {
            body {
                padding: 12px;
            }
            .container {
                padding: 20px 16px;
            }
            h1 {
                font-size: 20px;
            }
            p {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>BOS 是什么？</h1>
        <p>BOS 是一个运行在 TurboWarp 的操作系统原型</p>

        <img src="bos-logo.svg" alt="BOS Logo" style="width:100px; height:100px;">

        <p>Github网址：</p>
        <a href="https://github.com/qpwq1/Basic-Operating-System-BOS-" target="_blank">
            https://github.com/qpwq1/Basic-Operating-System-BOS-
        </a>

        <p>文档：</p>
        <a href="https://github.com/qpwq1/Basic-Operating-System-BOS-" target="_blank">
            https://github.com/qpwq1/Basic-Operating-System-BOS-/tree/main/doc
        </a>
        
    </div>
</body>
</html>
