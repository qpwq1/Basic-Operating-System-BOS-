<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOS · 基础操作系统内核</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0c15;
            font-family: system-ui, -apple-system, 'Segoe UI', monospace;
            color: #e2e9ff;
            line-height: 1.5;
        }

        .container {
            max-width: 960px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }

        /* Logo 区域 */
        .logo-section {
            text-align: center;
            margin-bottom: 3rem;
        }

        .logo {
            font-size: 4rem;
            font-weight: 700;
            letter-spacing: 6px;
            background: linear-gradient(135deg, #c0e0ff, #6a9eff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            line-height: 1.2;
        }

        .logo-sub {
            font-size: 0.8rem;
            letter-spacing: 3px;
            color: #6a7c9e;
            margin-top: 0.5rem;
        }

        .badge {
            display: inline-block;
            background: #1a1f2e;
            border: 1px solid #2a3550;
            border-radius: 40px;
            padding: 0.2rem 1rem;
            font-size: 0.7rem;
            color: #8a9cc0;
            margin-top: 1rem;
        }

        /* 简介 */
        .intro {
            text-align: center;
            max-width: 700px;
            margin: 0 auto 3rem auto;
            color: #b0c0e0;
        }

        .intro p {
            margin: 0.8rem 0;
        }

        /* 特点列表 - 极简 */
        .features {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1.2rem;
            margin: 2rem 0 3rem 0;
        }

        .feature {
            background: #11161f;
            border: 1px solid #232d3f;
            border-radius: 40px;
            padding: 0.4rem 1.2rem;
            font-size: 0.85rem;
            color: #b8c8f0;
        }

        /* 链接区 */
        .links {
            text-align: center;
            margin: 2rem 0;
        }

        .button {
            display: inline-block;
            background: #1a2538;
            color: #cce4ff;
            text-decoration: none;
            padding: 0.6rem 1.5rem;
            border-radius: 40px;
            font-size: 0.9rem;
            border: 1px solid #2e3f5a;
            transition: 0.2s;
            margin: 0 0.5rem;
        }

        .button:hover {
            background: #253a55;
            border-color: #4a7ab5;
        }

        footer {
            text-align: center;
            font-size: 0.7rem;
            color: #5b6f8c;
            margin-top: 3rem;
            padding-top: 1.5rem;
            border-top: 1px solid #1a2332;
        }

        @media (max-width: 600px) {
            .logo {
                font-size: 2.5rem;
                letter-spacing: 3px;
            }
            .feature {
                font-size: 0.75rem;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <!-- Logo 区域 -->
    <div class="logo-section">
        <div class="logo">BOS</div>
        <div class="logo-sub">Basic Operating System</div>
        <div class="badge">内核 · 不依赖扩展</div>
    </div>

    <!-- 简介 -->
    <div class="intro">
        <p>一个运行在 TurboWarp 上的操作系统内核原型。</p>
        <p>内存管理 · 进程通信 · 文件系统 · 脚本语言</p>
        <p>全部由积木实现，<span style="color:#6a9eff;">不依赖外部扩展</span>。</p>
    </div>

    <!-- 特点（只用文字，不堆技术名词）-->
    <div class="features">
        <span class="feature">📦 16KB 字寻址内存</span>
        <span class="feature">⚙️ BM 脚本语言</span>
        <span class="feature">📁 簇式文件系统</span>
        <span class="feature">🔄 进程通信 (SEND)</span>
        <span class="feature">🎨 双色显存操作</span>
        <span class="feature">🧩 模块化内核</span>
    </div>

    <!-- 链接 -->
    <div class="links">
        <a href="https://github.com/qpwq1/Basic-Operating-System-BOS-" class="button" target="_blank">GitHub</a>
        <a href="#" class="button" id="downloadBtn">下载内核 (.sprite3)</a>
    </div>

    <footer>
        <p>BOS 是一个内核，不是完整的桌面系统。<br>采用 GPL 3.0 许可证开源 · 个人项目，还有很多不完善的地方。</p>
    </footer>
</div>

<script>
    document.getElementById('downloadBtn').addEventListener('click', (e) => {
        e.preventDefault();
        alert('内核文件请到 GitHub 仓库或 Releases 中下载。\n当前可直接访问 GitHub 获取最新版本。');
        window.open('https://github.com/qpwq1/Basic-Operating-System-BOS-', '_blank');
    });
</script>
</body>
</html>
